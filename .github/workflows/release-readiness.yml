name: Release Readiness

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-readiness:
    name: Release readiness no-runtime gate
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run release readiness CI wrapper
        run: |
          bash scripts/run-release-readiness-ci.sh --root . --out-dir .
